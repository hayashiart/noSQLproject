<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Profils Utilisateurs</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 30px; 
            background: #f9f9f9;
        }
        h1 { color: #333; }
        input, button { 
            padding: 10px; 
            margin: 8px 5px 8px 0; 
            font-size: 16px;
        }
        button { 
            background: #4CAF50; 
            color: white; 
            border: none; 
            cursor: pointer;
        }
        button:hover { background: #45a049; }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            background: white;
        }
        th, td { 
            border: 1px solid #ddd; 
            padding: 10px; 
            text-align: left;
        }
        th { 
            background: #4CAF50; 
            color: white;
        }
    </style>
</head>
<body>
    <h1>Gestion Profils Utilisateurs</h1>

    <h2>Ajouter un utilisateur</h2>
    <input type="text" id="name" placeholder="Nom">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="city" placeholder="Ville">
    <br><br>
    <button onclick="addUser()">Ajouter l'utilisateur</button>

    <h2>Liste des utilisateurs</h2>
    <button onclick="loadUsers()">Rafraîchir la liste</button>

    <table id="table">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Email</th>
                <th>Ville</th>
                <th>Notifications</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        async function addUser() {
            const user = {
                name: document.getElementById("name").value.trim(),
                email: document.getElementById("email").value.trim(),
                address: {
                    city: document.getElementById("city").value.trim(),
                    country: "France"
                },
                preferences: {
                    notification: false
                },
                premium: false
            };

            // Vérification simple
            if (!user.email) {
                alert("L'email est obligatoire");
                return;
            }

            await fetch("/users", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(user)
            });

            // Réinitialiser le formulaire après ajout
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("city").value = "";

            loadUsers();   // Rafraîchir la liste
        }

        async function loadUsers() {
            const res = await fetch("/users");
            const users = await res.json();
            
            const tbody = document.querySelector("#table tbody");
            tbody.innerHTML = "";

            users.forEach(u => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${u.name || "—"}</td>
                    <td>${u.email}</td>
                    <td>${u.address?.city || "—"}</td>
                    <td>${u.preferences?.notification ? " Oui" : " Non"}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Charger la liste au démarrage
        window.onload = loadUsers;
    </script>
</body>
</html>
